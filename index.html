<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Mart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f5f5f5; }
.navbar { background:#232f3e; }
.navbar-brand { color:#fff !important; font-weight:bold; }
.product { background:#fff; padding:10px; border-radius:10px; margin:10px; }
.cart-box { position:fixed; right:10px; top:80px; background:#fff; padding:10px; width:250px; border-radius:10px; }
</style>
</head>

<body>

<nav class="navbar p-3">
  <div class="container">
    <span class="navbar-brand">🛒 Fresh Mart</span>
    <input type="text" id="search" placeholder="Search..." onkeyup="searchProduct()" class="form-control w-50">
  </div>
</nav>

<div class="container mt-3">
  <div class="row" id="products"></div>
</div>

<!-- Cart -->
<div class="cart-box">
  <h5>Cart 🛒</h5>
  <ul id="cart"></ul>
  <h6>Total: ₹<span id="total">0</span></h6>
  <button class="btn btn-success w-100" onclick="checkout()">Checkout</button>
</div>

<script>
let products = [
  {name:"Aloo", price:15},
  {name:"Pyaz", price:20},
  {name:"Oil", price:150}
  {name:"Noon", price:150}
  {name:"Saboon", price:150}
];

let cart = [];

function displayProducts(list){
  let html="";
  list.forEach((p,i)=>{
    html += `
    <div class="col-md-4">
      <div class="product text-center">
        <h5>${p.name}</h5>
        <p>₹${p.price}</p>
        <button class="btn btn-warning" onclick="addToCart(${i})">Add to Cart</button>
      </div>
    </div>`;
  });
  document.getElementById("products").innerHTML = html;
}

function addToCart(i){
  cart.push(products[i]);
  updateCart();
}

function updateCart(){
  let list="";
  let total=0;
  cart.forEach(item=>{
    list += `<li>${item.name} - ₹${item.price}</li>`;
    total += item.price;
  });
  document.getElementById("cart").innerHTML = list;
  document.getElementById("total").innerText = total;
}

function checkout(){
  let msg="Order:\n";
  cart.forEach(i=> msg += i.name + "\n");
  window.open("https://wa.me/9713417571?text="+encodeURIComponent(msg));
}

function searchProduct(){
  let val=document.getElementById("search").value.toLowerCase();
  let filtered = products.filter(p=>p.name.toLowerCase().includes(val));
  displayProducts(filtered);
}

displayProducts(products);
</script>

</body>
</html>
